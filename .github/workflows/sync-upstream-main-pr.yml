name: Sync Upstream Main PR

on:
  schedule:
    - cron: "13 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and origin refs
        run: |
          if git remote | grep -q '^upstream$'; then
            git remote set-url upstream "https://github.com/darrenhinde/OpenAgentsControl.git"
          else
            git remote add upstream "https://github.com/darrenhinde/OpenAgentsControl.git"
          fi

          git fetch upstream main
          git fetch origin main

      - name: Plan sync
        id: plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="bot/upstream-sync-main"
          MAIN_SHA="$(git rev-parse origin/main)"
          UPSTREAM_SHA="$(git rev-parse upstream/main)"
          UPSTREAM_AHEAD_COUNT="$(git rev-list --count origin/main..upstream/main)"
          EXISTING_PR="$(gh pr list --state open --base main --head "$SYNC_BRANCH" --json number --jq '.[0].number // empty')"

          echo "sync_branch=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
          echo "main_sha=$MAIN_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_ahead_count=$UPSTREAM_AHEAD_COUNT" >> "$GITHUB_OUTPUT"
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_AHEAD_COUNT" = "0" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "reason=already-aligned" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "needed=true" >> "$GITHUB_OUTPUT"
          echo "reason=sync-required" >> "$GITHUB_OUTPUT"

      - name: Report no-op
        if: steps.plan.outputs.needed != 'true'
        run: |
          echo "No sync PR created. reason=${{ steps.plan.outputs.reason }}"

      - name: Create or refresh sync branch
        if: steps.plan.outputs.needed == 'true'
        id: branch
        run: |
          BRANCH_NAME="${{ steps.plan.outputs.sync_branch }}"
          git checkout -B "$BRANCH_NAME" origin/main
          git merge --no-edit upstream/main
          git push -u origin "$BRANCH_NAME" --force-with-lease
          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Open pull request to main
        if: steps.plan.outputs.needed == 'true' && steps.plan.outputs.existing_pr == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > pr-body.md <<'EOF'
          ## Summary
          - Sync latest commits from `darrenhinde/OpenAgentsControl` into fork `main`
          - Keep fork `main` aligned so desktop overlay updates remain low-risk
          EOF

          BODY_CONTENT="$(cat pr-body.md)"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/pulls" \
            -f title="chore: sync upstream main ($(date -u +%Y-%m-%d))" \
            -f head="${{ steps.branch.outputs.name }}" \
            -f base="main" \
            -f body="$BODY_CONTENT"

      - name: Report updated existing sync PR
        if: steps.plan.outputs.needed == 'true' && steps.plan.outputs.existing_pr != ''
        run: |
          echo "Updated branch for existing PR #${{ steps.plan.outputs.existing_pr }}"
